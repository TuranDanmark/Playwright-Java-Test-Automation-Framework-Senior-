name: Playwright CI (Senior Level)

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  JAVA_VERSION: 21
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # =========================
  # BUILD STAGE
  # =========================
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      # 🔑 Генерация ключа кэша
      - name: Generate cache key
        id: cache-key
        run: echo "key=playwright-${{ runner.os }}-v2" >> $GITHUB_OUTPUT

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ steps.cache-key.outputs.key }}

      # Install browsers + deps
      - name: Install Playwright Browsers
        run: mvn exec:java -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install chromium firefox webkit --force"

      - name: Install Playwright dependencies
        run: npx playwright install-deps
        
      - name: Build project (skip tests)
        run: mvn -B clean package -DskipTests

  # =========================
  # TEST STAGE (MATRIX)
  # =========================
  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Restore Playwright Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-v2

      # 🎯 Запуск тестов
      - name: Run Tests
        run: |
          mvn -B test \
          -Dbrowser=${{ matrix.browser }} \
          -Dheadless=true \
          -DretryCount=1

      # 📦 Артефакты (важно для дебага)
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-${{ matrix.browser }}
          path: target/allure-results

      - name: Upload Traces / Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.browser }}
          path: |
            target/traces
            target/screenshots
            target/videos
          if-no-files-found: ignore

  # =========================
  # REPORT STAGE
  # =========================
  report:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download All Results
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # 🧠 Merge Allure
      - name: Merge Allure Results
        run: |
          mkdir -p target/allure-results
          find artifacts -type f -name "*.json" \
          -exec cp {} target/allure-results \;
      - name: Generate Allure Report
        run: mvn allure:report

      - name: Deploy (debug)
        run: |
          git checkout --orphan gh-pages
          git rm -rf .
          cp -r target/site/allure-maven-plugin/* .
          git add .
          git commit -m "test deploy"
          git push origin gh-pages --force

      # 📊 GitHub summary (Senior touch)
      - name: Publish Summary
        run: |
          echo "## ✅ Test Report" >> $GITHUB_STEP_SUMMARY
          echo "Allure report generated successfully." >> $GITHUB_STEP_SUMMARY
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./target/site/allure-maven-plugin
          force_orphan: true